<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>速読英単語 空所補充クイズ No.301–400</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand-block">
        <div class="eyebrow">Sokutan Practice</div>
        <h1 id="appTitle">速読英単語 必修編[改訂第8版] No.301–400</h1>
        <p class="subtitle">日本語を手がかりに、英文の空所に入る語を選びましょう。</p>
      </div>
      <div class="header-badge">4択 / 自動採点</div>
    </header>
    <main>
      <section id="menuScreen" class="card menu-card">
        <h2>出題設定</h2>
        <div class="settings-grid">
          <label class="field"><span>開始番号</span><input id="startNo" type="number" min="301" max="400" value="301" /></label>
          <label class="field"><span>終了番号</span><input id="endNo" type="number" min="301" max="400" value="400" /></label>
        </div>
        <div class="mode-box" role="radiogroup" aria-label="出題順">
          <label class="mode-option selected"><input type="radio" name="mode" value="ordered" checked /><span>順番通り</span></label>
          <label class="mode-option"><input type="radio" name="mode" value="random" /><span>ランダム</span></label>
        </div>
        <p id="rangeInfo" class="range-info">301〜400の100問を出題します。</p>
        <button id="startBtn" class="primary-btn">Start</button>
      </section>
      <section id="quizScreen" class="card quiz-card hidden">
        <div class="quiz-topbar">
          <div><div id="progressText" class="progress-text">1 / 100</div><div class="progress-track"><div id="progressFill" class="progress-fill"></div></div></div>
          <button id="backMenuBtn" class="ghost-btn">メニューに戻る</button>
        </div>
        <div class="question-number" id="questionNumber">No. 1</div>
        <div id="jpText" class="jp-text"></div>
        <div id="enText" class="en-text"></div>
        <div id="choices" class="choices"></div>
        <div id="feedback" class="feedback hidden"></div>
        <button id="nextBtn" class="secondary-next-btn next-btn">次へ（スキップ）</button>
      </section>
      <section id="resultScreen" class="card result-card hidden">
        <div class="result-icon">✓</div>
        <h2>結果</h2>
        <p id="scoreText" class="score-text"></p>
        <p id="resultDetail" class="result-detail"></p>
        <div class="result-actions"><button id="retryBtn" class="primary-btn">同じ範囲でもう一度</button><button id="resultMenuBtn" class="ghost-btn">メニューに戻る</button></div>
      </section>
    </main>
  </div>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
